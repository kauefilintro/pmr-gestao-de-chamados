<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acesse o Sistema de Chamados da T.I da Prefeitura de Riachuelo">
  <title>Faça seu login</title>
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" href="icons/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/global.css">
</head>

<body>
  <main>
    <div>
      <img src="imgs/logo-da-pref.png" alt="Prefeitura Municipal de Riachuelo" class="logo-prefeitura">
      <h1> Seja bem vindo! </h1>
      <h3> Faça seu login para continuar </h3>
    </div>

    <div>
      <h1>Login</h1>
      <h3> Faça seu login para continuar </h3>
      
      <form>
        <label for="cpf-login">CPF</label>
        <input type="text" id="cpf-login" name="CPF" required><br>

        <label for="senha-login">Senha</label>
        <input type="password" id="senha-login" name="Senha" required><br>

        <input type="submit" value="Entrar"><br>
        
        <div>
          <input type="checkbox" id="keep-login" name="Lembre de mim">
          <label for="keep-login">Lembre de mim</label><br>
        </div>

      </form>

      <a href="https://google.com">Esqueci a senha</a><br>

    </div>
  </main>
</body>
</html>
